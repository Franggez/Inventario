<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario Inteligente - La Número 1</title>
    <style>
        :root { --rojo: #b71c1c; --alerta: #ff1744; --azul: #1976d2; --verde: #2e7d32; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        
        h1 { color: var(--rojo); text-align: center; margin-bottom: 10px; }
        
        /* Reproductor de Música */
        .music-player { background: #f8f9fa; padding: 10px; border-radius: 10px; text-align: center; margin-bottom: 20px; border: 1px solid #ddd; }
        .music-player span { font-size: 12px; font-weight: bold; color: #555; display: block; margin-bottom: 5px; }

        /* Buscador Fijo */
        .search-container { position: sticky; top: 0; background: white; padding: 10px 0; z-index: 100; border-bottom: 2px solid #eee; margin-bottom: 20px; }
        #buscador { width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 10px; font-size: 18px; box-sizing: border-box; outline: none; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        #buscador:focus { border-color: var(--azul); }

        .seccion-titulo { background: #333; color: white; padding: 10px; margin-top: 20px; border-radius: 5px; font-size: 14px; letter-spacing: 1px; }
        
        .item-row { display: flex; align-items: center; justify-content: space-between; padding: 12px; border-bottom: 1px solid #ddd; transition: 0.3s; }
        .item-row:hover { background: #f9f9f9; }
        
        .item-info { flex: 2; }
        .nombre-prod { font-weight: bold; display: block; font-size: 16px; color: #333; }
        
        /* Etiquetas Disponibilidad */
        .badge { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; margin-top: 5px; text-transform: uppercase; }
        .disp { background: #e8f5e9; color: var(--verde); }
        .agot { background: #ffebee; color: var(--alerta); }
        
        .inputs { flex: 2; display: flex; gap: 10px; justify-content: flex-end; }
        .input-group { text-align: center; }
        input { width: 65px; padding: 8px; border: 1px solid #ccc; border-radius: 5px; text-align: center; font-size: 16px; font-weight: bold; }
        
        /* Estilo Alerta Rojo */
        .bajo-stock { color: var(--alerta) !important; text-decoration: underline; }
        .label-mini { font-size: 10px; color: #888; display: block; margin-bottom: 2px; }
        
        /* Botones */
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 25px; }
        .btn-update { background: var(--rojo); color: white; border: none; padding: 15px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-reporte { background: var(--azul); color: white; border: none; padding: 15px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        
        .hidden { display: none !important; }
        #status { text-align: center; font-size: 14px; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Restaurant La Número 1</h1>

    <div class="music-player">
        <span>Música</span>
        <audio id="musicaFondo" controls loop style="height: 30px;">
            <source src="Alaska - Victor Mendivil y Hades66 (audio oficial).mp3" type="audio/mpeg">
        </audio>
    </div>
    
    <div id="status">Cargando inventario...</div>

    <div class="search-container">
        <input type="text" id="buscador" placeholder="Buscar producto..." onkeyup="filtrarProductos()">
    </div>
    
    <div id="contenido-inventario">
        <div class="seccion-titulo">REFRESCOS Y CERVEZAS</div>
        <div id="area-refrescos"></div>
        <div class="seccion-titulo">VINOS Y LICORES</div>
        <div id="area-vinos"></div>
    </div>

    <div class="btn-group">
        <button class="btn-update" onclick="actualizarInventario()">Sincronizar Nube</button>
        <button class="btn-reporte" onclick="generarReporte()">Lista de Compras</button>
    </div>
</div>

<script>
    // CAMBIA ESTA URL POR LA DE TU GOOGLE APPS SCRIPT
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbzcgry9MFj5lRcfp4j8HpoKoFny7Fsv3ulS_9lO0lwGR2kCm9wVXL6QzOLMXQkrKNNR-w/exec"; 
    let datosActuales = [];

    // Activar música al interactuar con la página (Requisito de navegadores)
    window.onclick = () => { 
        const audio = document.getElementById('musicaFondo');
        if (audio.paused) audio.play(); 
    };

    async function cargarDatos() {
        try {
            const response = await fetch(URL_SCRIPT);
            datosActuales = await response.json();
            renderizar(datosActuales);
            document.getElementById('status').innerHTML = "<span style='color:green'>✅ Sincronizado con Google Sheets</span>";
        } catch (e) {
            document.getElementById('status').innerHTML = "<span style='color:red'>❌ Error: Revisa la URL del Script</span>";
        }
    }

    function renderizar(datos) {
        const areaRefrescos = document.getElementById('area-refrescos');
        const areaVinos = document.getElementById('area-vinos');
        areaRefrescos.innerHTML = ""; areaVinos.innerHTML = "";

        datos.forEach(item => {
            let esAlerta = false;
            let disponible = item.cantidad > 0;
            
            if (item.tipo === "Refresco") {
                if (item.cantidad < 40 || item.cajas < 10) esAlerta = true;
                areaRefrescos.innerHTML += crearFila(item, esAlerta, disponible, true);
            } else {
                if (item.cantidad < 5) esAlerta = true;
                areaVinos.innerHTML += crearFila(item, esAlerta, disponible, false);
            }
        });
    }

    function crearFila(item, alerta, disponible, mostrarCajas) {
        return `
            <div class="item-row" data-nombre="${item.producto.toLowerCase()}">
                <div class="item-info">
                    <span class="nombre-prod ${alerta ? 'bajo-stock' : ''}">${item.producto}</span>
                    <span class="badge ${disponible ? 'disp' : 'agot'}">${disponible ? 'Disponible' : 'Agotado'}</span>
                </div>
                <div class="inputs">
                    <div class="input-group">
                        <span class="label-mini">Pzs</span>
                        <input type="number" class="val-pzs" data-nombre="${item.producto}" value="${item.cantidad}">
                    </div>
                    ${mostrarCajas ? `
                    <div class="input-group">
                        <span class="label-mini">Cajas</span>
                        <input type="number" class="val-cajas" value="${item.cajas}">
                    </div>` : ''}
                </div>
            </div>`;
    }

    function filtrarProductos() {
        const busqueda = document.getElementById('buscador').value.toLowerCase();
        document.querySelectorAll('.item-row').forEach(fila => {
            fila.classList.toggle('hidden', !fila.getAttribute('data-nombre').includes(busqueda));
        });
    }

    async function actualizarInventario() {
        const btn = document.querySelector('.btn-update');
        btn.innerText = "Guardando...";
        const nuevosDatos = [];
        document.querySelectorAll('.item-row').forEach(row => {
            const nombre = row.querySelector('.val-pzs').dataset.nombre;
            const pzs = row.querySelector('.val-pzs').value;
            const cajas = row.querySelector('.val-cajas') ? row.querySelector('.val-cajas').value : 0;
            nuevosDatos.push({ producto: nombre, cantidad: pzs, cajas: cajas });
        });
        
        try {
            await fetch(URL_SCRIPT, { method: 'POST', mode: 'no-cors', body: JSON.stringify(nuevosDatos) });
            alert(" ¡Cambios guardados con éxito!");
            cargarDatos();
        } catch(e) { alert("Error al conectar"); }
        btn.innerText = "Sincronizar Nube";
    }

    function generarReporte() {
        let reporte = "<h2>Lista de Compras - La Número 1</h2><table border='1' style='width:100%; border-collapse:collapse;'>";
        reporte += "<tr style='background:#eee'><th>Producto</th><th>Actual</th><th>Acción</th></tr>";
        let hay = false;
        datosActuales.forEach(item => {
            let alerta = (item.tipo === "Refresco") ? (item.cantidad < 40 || item.cajas < 10) : (item.cantidad < 5);
            if(alerta) {
                hay = true;
                reporte += `<tr><td>${item.producto}</td><td align="center">${item.cantidad}</td><td style='color:red'>REABASTECER</td></tr>`;
            }
        });
        if(!hay) return alert("Todo en orden.");
        const win = window.open('','','width=400,height=500');
        win.document.write(reporte + "</table><br><button onclick='window.print()'>Imprimir</button>");
    }

    window.onload = cargarDatos;
</script>
</body>
</html>
