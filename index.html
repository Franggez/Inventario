<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Inventario - La Número 1</title>
    <style>
        :root { --rojo: #b71c1c; --alerta: #ff1744; --azul: #1976d2; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        h1 { color: var(--rojo); text-align: center; border-bottom: 3px solid var(--rojo); padding-bottom: 10px; }
        .seccion-titulo { background: #333; color: white; padding: 10px; margin-top: 20px; border-radius: 5px; }
        .item-row { display: flex; align-items: center; justify-content: space-between; padding: 12px; border-bottom: 1px solid #ddd; }
        .item-info { flex: 2; font-weight: bold; }
        .inputs { flex: 2; display: flex; gap: 10px; justify-content: flex-end; }
        input { width: 70px; padding: 8px; border: 1px solid #ccc; border-radius: 5px; text-align: center; font-size: 16px; }
        .bajo-stock { color: var(--alerta) !important; animation: blink 2s infinite; }
        .label-stock { font-size: 11px; display: block; color: #666; }
        @keyframes blink { 50% { opacity: 0.5; } }
        .btn-update { background: var(--rojo); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .btn-reporte { background: var(--azul); color: white; border: none; padding: 10px; width: 100%; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .loading { text-align: center; font-style: italic; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h1>Inventario Restaurant La Número 1</h1>
    <div id="status" class="loading">Cargando datos...</div>
    
    <div id="contenido-inventario">
        <div class="seccion-titulo">REFRESCOS Y CERVEZAS</div>
        <div id="area-refrescos"></div>
        <div class="seccion-titulo">VINOS Y LICORES</div>
        <div id="area-vinos"></div>
    </div>

    <button class="btn-update" onclick="actualizarInventario()">Sincronizar Cambios con Nube</button>
    <button class="btn-reporte" onclick="generarReporte()">Ver Lista de Compras (Faltantes)</button>
</div>

<script>
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbzcgry9MFj5lRcfp4j8HpoKoFny7Fsv3ulS_9lO0lwGR2kCm9wVXL6QzOLMXQkrKNNR-w/exec";
    let datosActuales = [];

    async function cargarDatos() {
        try {
            const response = await fetch(URL_SCRIPT);
            datosActuales = await response.json();
            renderizar(datosActuales);
            document.getElementById('status').innerText = "✅ Datos actualizados";
        } catch (e) {
            document.getElementById('status').innerText = "❌ Error de conexión.";
        }
    }

    function renderizar(datos) {
        const areaRefrescos = document.getElementById('area-refrescos');
        const areaVinos = document.getElementById('area-vinos');
        areaRefrescos.innerHTML = ""; areaVinos.innerHTML = "";

        datos.forEach(item => {
            let esAlerta = false;
            if (item.tipo === "Refresco") {
                if (item.cantidad < 40 || item.cajas < 10) esAlerta = true;
                areaRefrescos.innerHTML += crearFila(item, esAlerta, true);
            } else {
                if (item.cantidad < 5) esAlerta = true;
                areaVinos.innerHTML += crearFila(item, esAlerta, false);
            }
        });
    }

    function crearFila(item, alerta, mostrarCajas) {
        return `
            <div class="item-row">
                <div class="item-info ${alerta ? 'bajo-stock' : ''}">${item.producto}</div>
                <div class="inputs">
                    <div><span class="label-stock">Pzs</span><input type="number" class="val-pzs" data-nombre="${item.producto}" value="${item.cantidad}"></div>
                    ${mostrarCajas ? `<div><span class="label-stock">Cajas</span><input type="number" class="val-cajas" value="${item.cajas}"></div>` : ''}
                </div>
            </div>`;
    }

    function generarReporte() {
        let faltantes = "<h1>Lista de Compras - La Número 1</h1><table border='1' style='width:100%; border-collapse: collapse; font-family: sans-serif;'>";
        faltantes += "<tr style='background:#eee;'><th>Producto</th><th>Cantidad Actual</th><th>Estado</th></tr>";
        
        let hayFaltantes = false;
        datosActuales.forEach(item => {
            let alerta = (item.tipo === "Refresco") ? (item.cantidad < 40 || item.cajas < 10) : (item.cantidad < 5);
            if(alerta) {
                hayFaltantes = true;
                faltantes += `<tr><td style="padding:10px;">${item.producto}</td><td style="padding:10px; text-align:center;">${item.cantidad} pzs / ${item.cajas} cajas</td><td style="color:red; padding:10px; text-align:center;"><b>PEDIR URGENTE</b></td></tr>`;
            }
        });

        if(!hayFaltantes) {
            alert("¡Todo está en orden! No hay productos bajo el límite.");
            return;
        }

        const ventana = window.open('', '', 'width=600,height=600');
        ventana.document.write(faltantes + "</table><br><button onclick='window.print()'>Imprimir Lista</button>");
        ventana.document.close();
    }

    async function actualizarInventario() {
        const btn = document.querySelector('.btn-update');
        btn.innerText = "Sincronizando...";
        const nuevosDatos = [];
        document.querySelectorAll('.item-row').forEach(row => {
            const nombre = row.querySelector('.val-pzs').dataset.nombre;
            const pzs = row.querySelector('.val-pzs').value;
            const cajas = row.querySelector('.val-cajas') ? row.querySelector('.val-cajas').value : 0;
            nuevosDatos.push({ producto: nombre, cantidad: pzs, cajas: cajas });
        });
        await fetch(URL_SCRIPT, { method: 'POST', mode: 'no-cors', body: JSON.stringify(nuevosDatos) });
        alert("Sincronizado.");
        cargarDatos();
        btn.innerText = "Sincronizar Cambios con Nube";
    }

    window.onload = cargarDatos;
</script>
</body>
</html>
